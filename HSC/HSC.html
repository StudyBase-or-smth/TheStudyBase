<link rel="apple-touch-icon" href="../icon.png">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* Quiz UI — uses the app's existing CSS variables, with fallbacks in case any aren't set */
  .quiz-status {
    padding: 24px;
    font-family: 'Inter', sans-serif;
    color: var(--muted, #666);
  }
  .quiz-status.quiz-error { color: #c0392b; }

  /* Overall two-column layout: nav sidebar on the left, question content on the right. */
  .quiz-layout {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 4px;
  }
  .quiz-sidebar {
    width: 172px;
    flex-shrink: 0;
    font-family: 'Inter', sans-serif;
  }
  .quiz-sidebar-select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border, #e0e0e0);
    border-radius: 7px;
    background: var(--card, #fff);
    color: var(--text, #1a1a1a);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    cursor: pointer;
  }
  .quiz-nav-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .quiz-nav-btn {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border, #e0e0e0);
    border-radius: 6px;
    background: var(--card, #fff);
    color: var(--text, #1a1a1a);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    transition: border-color .15s, background .15s;
  }
  .quiz-nav-btn:hover { border-color: var(--accent, #4f46e5); }
  .quiz-nav-btn.current { border-color: var(--accent, #4f46e5); border-width: 2px; font-weight: 700; }
  .quiz-nav-btn.nav-correct { background: rgba(46,125,50,0.14); border-color: #2e7d32; color: #2e7d32; }
  .quiz-nav-btn.nav-partial { background: rgba(184,134,11,0.14); border-color: #b8860b; color: #b8860b; }
  .quiz-nav-btn.nav-incorrect { background: rgba(192,57,43,0.12); border-color: #c0392b; color: #c0392b; }
  .quiz-nav-legend {
    margin-top: 12px;
    font-size: 10px;
    color: var(--muted2, #999);
    line-height: 1.7;
  }
  .quiz-nav-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: middle;
  }
  .quiz-nav-dot.nav-correct { background: #2e7d32; }
  .quiz-nav-dot.nav-partial { background: #b8860b; }
  .quiz-nav-dot.nav-incorrect { background: #c0392b; }

  .quiz-main { flex: 1; min-width: 0; }

  @media (max-width: 640px) {
    .quiz-layout { flex-direction: column; }
    .quiz-sidebar { width: 100%; }
    .quiz-nav-grid { grid-template-columns: repeat(8, 1fr); }
  }

  .quiz-wrap {
    font-family: 'Inter', sans-serif;
  }
  .quiz-progress {
    font-size: 12px;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--muted2, #999);
    margin-bottom: 10px;
  }
  /* Exam-style heading: "Question 11" left, "(3 marks)" right, thin rule underneath —
     mirrors the look of the printed HSC paper. */
  .quiz-heading {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    font-family: 'Lora', serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--text, #1a1a1a);
    padding-bottom: 8px;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border, #e0e0e0);
  }
  .quiz-heading-marks {
    font-weight: 400;
    font-size: 13px;
    color: var(--muted2, #999);
    white-space: nowrap;
  }
  /* Question stem — the actual wording, styled like exam-paper body text rather
     than a UI label. Falls back to holding the full question text on older quiz
     files that don't have a separate `question` field. */
  .quiz-stem {
    font-family: 'Lora', serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--text, #1a1a1a);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .quiz-type-hint {
    font-size: 12px;
    color: var(--muted2, #999);
    margin-bottom: 14px;
  }
  .quiz-image-wrap:empty { display: none; }
  .quiz-image-wrap { margin-bottom: 16px; }
  .quiz-image {
    display: block;
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid var(--border, #e0e0e0);
    background: var(--card, #fff);
  }

  /* Multiple choice / checkbox answers */
  .quiz-answers {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .quiz-answer {
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    padding: 12px 14px;
    border: 1px solid var(--border, #e0e0e0);
    border-radius: 8px;
    background: var(--card, #fff);
    color: var(--text, #1a1a1a);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .quiz-answer:hover:not(.locked) { border-color: var(--accent, #4f46e5); }
  .quiz-answer.selected { border-color: var(--accent, #4f46e5); background: color-mix(in srgb, var(--accent, #4f46e5) 10%, transparent); }
  .quiz-answer.locked { cursor: default; }
  .quiz-answer.correct { border-color: #2e7d32; background: rgba(46,125,50,0.12); }
  .quiz-answer.incorrect { border-color: #c0392b; background: rgba(192,57,43,0.10); }
  .quiz-answer input[type="radio"],
  .quiz-answer input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: var(--accent, #4f46e5);
    flex-shrink: 0;
    cursor: pointer;
  }
  .quiz-answer.locked input { cursor: default; }

  /* Math / fill-in-the-blank answers */
  .quiz-math-answers {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  /* One group per run of consecutive same-type entries (e.g. all "working" rows
     together, the final "answer" row on its own). Styled as ruled writing lines
     rather than boxed UI cards, closer to the blank answer space on the printed
     exam paper. */
  .quiz-math-group {
    padding: 4px 0 10px;
  }
  .quiz-math-group-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--muted2, #999);
    margin-bottom: 8px;
  }
  .quiz-math-input-rows {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .quiz-math-input-row { display: flex; align-items: center; gap: 10px; }
  .quiz-math-input {
    flex: 1;
    border: none;
    border-bottom: 1px dotted var(--muted2, #999);
    border-radius: 0;
    padding: 6px 2px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    background: transparent;
    color: var(--text, #1a1a1a);
  }
  .quiz-math-input:focus { outline: none; border-bottom-style: solid; border-bottom-color: var(--accent, #4f46e5); }
  .quiz-math-input:disabled { opacity: .85; }
  .quiz-math-input-row.correct .quiz-math-input { border-bottom-color: #2e7d32; border-bottom-style: solid; }
  .quiz-math-input-row.incorrect .quiz-math-input { border-bottom-color: #c0392b; border-bottom-style: solid; }
  /* Working rows: same grading behavior as an answer row, styled as a lighter, secondary step */
  .quiz-math-group.quiz-math-working .quiz-math-input {
    font-style: italic;
  }
  .quiz-math-mark-label {
    font-size: 11px;
    color: var(--muted2, #999);
    white-space: nowrap;
  }
  .quiz-math-hint {
    font-size: 12px;
    color: #c0392b;
    margin-top: 4px;
  }

  .quiz-feedback { font-size: 14px; font-weight: 600; min-height: 20px; margin-bottom: 12px; }
  .quiz-feedback.quiz-correct { color: #2e7d32; }
  .quiz-feedback.quiz-partial { color: #b8860b; }
  .quiz-feedback.quiz-incorrect { color: #c0392b; }

  .quiz-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .quiz-btn {
    padding: 9px 18px;
    border-radius: 7px;
    border: 1px solid var(--border, #e0e0e0);
    background: var(--card, #fff);
    color: var(--text, #1a1a1a);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .quiz-btn-primary { background: var(--accent, #4f46e5); color: #fff; border-color: transparent; }
  .quiz-btn:disabled { opacity: .5; cursor: default; }

  .quiz-summary { text-align: center; }
  .quiz-score {
    font-family: 'Lora', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--text, #1a1a1a);
    margin: 12px 0 22px;
  }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const cfg = {
    apiKey:"AIzaSyAZeyBIaTstTJ5Pr9o86MHk8dhDPAJFFCA",
    authDomain:"studybase-8cfa1.firebaseapp.com",
    projectId:"studybase-8cfa1",
    storageBucket:"studybase-8cfa1.firebasestorage.app",
    messagingSenderId:"434992387793",
    appId:"1:434992387793:web:e5bcae8cad63b4eb6f17f0"
  };
  const auth = getAuth(initializeApp(cfg));
  onAuthStateChanged(auth, user => {
    const isGuest = sessionStorage.getItem('studybase_guest') === '1';
    if (user) {
      sessionStorage.removeItem('studybase_guest');
      user.getIdTokenResult().then(result => {
        const status = result.claims.status || '';
        if (status === 'pending') {
          window.isGuest = true;
          document.body.classList.add('guest-mode');
          document.getElementById('guest-border').style.display = 'block';
          document.getElementById('guest-nudge').style.display = 'block';
          return;
        }
        if (status === 'rejected') {
          window.location.href = '../login.html';
          return;
        }
        // teacher / dev / student, active — full access, nothing extra needed
      });
    } else if (isGuest) {
      window.isGuest = true;
      document.body.classList.add('guest-mode');
      document.getElementById('guest-border').style.display = 'block';
      document.getElementById('guest-nudge').style.display = 'block';
    } else {
      window.location.href = "../login.html";
    }
  });
  window.sbSignOut = () => {
    if (sessionStorage.getItem('studybase_guest') === '1') {
      sessionStorage.removeItem('studybase_guest');
      window.location.href = "../login.html";
      return;
    }
    signOut(auth).then(() => window.location.href = "../login.html");
  };
</script>

<!-- ── Quiz engine ──
     Picks a random quiz JSON from ./storage (via storage/manifest.json, since a static
     folder can't be listed directly by the browser), then walks its questions in order.

     Question types:
       - Multiple choice, single answer: isMultipleChoice: true, isCheckbox: false (or omitted) → radio group
       - Multiple choice, multi-select:   isMultipleChoice: true, isCheckbox: true              → checkboxes
       - Math / fill-in-the-blank:        math: true → one textbox per entry in "answers",
         each worth 1 mark, graded independently (numeric-aware) against answers[i].text.

     manifest.json is a list of { file, name } entries — "file" is the quiz filename in this
     folder, "name" is the display name shown in the progress line (e.g. "Section 1"). -->
<script>
const STORAGE_FOLDER = 'storage';
let quizState = null;
let quizManifest = []; // [{file, name}, ...] — loaded once, reused by the sidebar dropdown

async function loadRandomQuiz() {
  const canvas = document.getElementById('hscCanvas');
  canvas.innerHTML = '<div class="quiz-status">Loading quiz…</div>';
  try {
    const manifestRes = await fetch(`${STORAGE_FOLDER}/manifest.json`);
    if (!manifestRes.ok) throw new Error('Could not load storage/manifest.json');
    const manifest = await manifestRes.json();
    if (!Array.isArray(manifest) || manifest.length === 0) {
      throw new Error('manifest.json has no quiz files listed');
    }

    // Each entry is normally { file, name }; a bare string filename is also accepted
    // (name falls back to the filename) so older manifest.json files keep working.
    quizManifest = manifest.map(entry =>
      typeof entry === 'string' ? { file: entry, name: entry } : { file: entry.file, name: entry.name || entry.file }
    );

    const chosen = quizManifest[Math.floor(Math.random() * quizManifest.length)];
    await loadQuizByFile(chosen.file, chosen.name);
  } catch (err) {
    canvas.innerHTML = `<div class="quiz-status quiz-error">Error loading quiz: ${escapeHtml(err.message)}</div>`;
  }
}

// Loads one specific quiz file by name (used for the initial random pick and for the
// sidebar dropdown). Resets all per-question progress, since switching quizzes starts fresh.
async function loadQuizByFile(file, name) {
  const canvas = document.getElementById('hscCanvas');
  canvas.innerHTML = '<div class="quiz-status">Loading quiz…</div>';
  try {
    const quizRes = await fetch(`${STORAGE_FOLDER}/${file}`);
    if (!quizRes.ok) throw new Error(`Could not load ${file}`);
    const quizData = await quizRes.json();

    if (!Array.isArray(quizData.questions) || quizData.questions.length === 0) {
      throw new Error(`${file} has no questions`);
    }

    const totalMarks = quizData.questions.reduce(
      (sum, q) => sum + (q.math ? q.answers.length : 1), 0
    );

    quizState = {
      questions: quizData.questions,
      filename: file,
      quizName: name || file,
      index: 0,
      // One slot per question: null until answered, then { earned, total, selected | values }
      // — used both for scoring (no more running accumulator to double-count) and to redraw
      // a question exactly as the student left it when they jump back to it via the sidebar.
      perQuestion: new Array(quizData.questions.length).fill(null),
      totalMarks
    };
    renderQuestion();
  } catch (err) {
    canvas.innerHTML = `<div class="quiz-status quiz-error">Error loading quiz: ${escapeHtml(err.message)}</div>`;
  }
}

// Sidebar dropdown "onchange" handler.
function onQuizSelect(selectEl) {
  const file = selectEl.value;
  const entry = quizManifest.find(m => m.file === file);
  loadQuizByFile(file, entry ? entry.name : file);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getEarnedMarks() {
  return quizState.perQuestion.reduce((sum, p) => sum + (p ? p.earned : 0), 0);
}

function renderQuestion() {
  const canvas = document.getElementById('hscCanvas');
  canvas.innerHTML = `
    <div class="quiz-layout">
      <nav class="quiz-sidebar" id="quizSidebar"></nav>
      <div class="quiz-main" id="quizMain"></div>
    </div>
  `;
  renderSidebar();

  const { questions, index } = quizState;
  if (index >= questions.length) {
    renderSummary();
    return;
  }

  const q = questions[index];
  const prior = quizState.perQuestion[index]; // null if not yet answered

  if (q.math) {
    renderMathQuestion(q, index, questions.length, prior);
  } else {
    renderChoiceQuestion(q, index, questions.length, prior);
  }
}

/* ── Sidebar: quiz-file dropdown + per-question jump grid ── */

function renderSidebar() {
  const sidebar = document.getElementById('quizSidebar');
  if (!sidebar || !quizState) return;

  const options = quizManifest.map(m =>
    `<option value="${escapeHtml(m.file)}"${m.file === quizState.filename ? ' selected' : ''}></option>`
  ).join('');

  const navButtons = quizState.questions.map((q, i) => {
    const prior = quizState.perQuestion[i];
    let statusClass = '';
    if (prior) {
      statusClass = prior.earned === prior.total ? 'nav-correct' : (prior.earned > 0 ? 'nav-partial' : 'nav-incorrect');
    }
    const current = i === quizState.index ? ' current' : '';
    return `<button type="button" class="quiz-nav-btn ${statusClass}${current}" data-idx="${i}"></button>`;
  }).join('');

  sidebar.innerHTML = `
    <select class="quiz-sidebar-select" id="quizSidebarSelect">${options}</select>
    <div class="quiz-nav-grid">${navButtons}</div>
    <div class="quiz-nav-legend">
      <div><span class="quiz-nav-dot nav-correct"></span>Correct</div>
      <div><span class="quiz-nav-dot nav-partial"></span>Partial</div>
      <div><span class="quiz-nav-dot nav-incorrect"></span>Incorrect</div>
    </div>
  `;

  // Labels set via textContent (not innerHTML) so manifest/question text can never inject markup.
  sidebar.querySelectorAll('#quizSidebarSelect option').forEach((opt, i) => {
    opt.textContent = quizManifest[i].name;
  });
  sidebar.querySelector('#quizSidebarSelect').addEventListener('change', (e) => onQuizSelect(e.target));

  sidebar.querySelectorAll('.quiz-nav-btn').forEach((btn, i) => {
    btn.textContent = quizState.questions[i].id.replace(/^q/i, '');
    btn.addEventListener('click', () => jumpToQuestion(i));
  });
}

function jumpToQuestion(i) {
  quizState.index = i;
  renderQuestion();
}

/* ── Multiple choice / checkbox ── */

function renderChoiceQuestion(q, index, total, prior) {
  const main = document.getElementById('quizMain');
  // Radios for single-answer questions (native, mutually exclusive via shared `name`),
  // checkboxes for multi-answer questions (native, independent toggles).
  const inputType = q.isCheckbox ? 'checkbox' : 'radio';
  const answerButtons = q.answers.map((a, i) =>
    `<label class="quiz-answer" data-idx="${i}">
       <input type="${inputType}" name="quizAnswer" value="${i}" onchange="selectAnswer()">
       <span class="quiz-answer-text"></span>
     </label>`
  ).join('');

  main.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-progress">Question ${index + 1} of ${total} of "${escapeHtml(quizState.quizName || '')}"</div>
      <div class="quiz-heading">
        <span class="quiz-heading-name"></span>
        <span class="quiz-heading-marks">(1 mark)</span>
      </div>
      <div class="quiz-stem"></div>
      <div class="quiz-image-wrap" id="quizImageWrap"></div>
      <div class="quiz-type-hint">${q.isCheckbox ? '☑ Select all that apply' : '◉ Choose one answer'}</div>
      <div class="quiz-answers">${answerButtons}</div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-actions">
        <button class="quiz-btn quiz-btn-primary" id="quizSubmitBtn" onclick="submitAnswer()">Submit</button>
        <button class="quiz-btn" id="quizNextBtn" style="display:none" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  `;

  // Set text content via textContent (not innerHTML) so quiz content can never inject markup.
  // `question` is the exam wording; `name` is the short heading ("Question 11"). Older quiz
  // files without a `question` field fall back to showing `name` as the stem, no heading.
  renderHeadingAndStem(main, q);
  renderQuestionImage(q, main);
  main.querySelectorAll('.quiz-answer').forEach((label, i) => {
    label.querySelector('.quiz-answer-text').textContent = q.answers[i].text;
  });

  // Already answered on a previous visit (jumped back here via the sidebar) — redraw the
  // locked, graded state instead of a fresh editable form, so nothing can be re-submitted.
  if (prior) {
    applyChoiceGrading(main, q, new Set(prior.selected));
    showFeedback(main, prior.earned, prior.total);
    document.getElementById('quizSubmitBtn').style.display = 'none';
    if (index + 1 < total) document.getElementById('quizNextBtn').style.display = 'inline-block';
  }
}

function selectAnswer() {
  // Resync the 'selected' style class from whatever is currently checked —
  // works the same for radios (browser auto-unchecks the rest of the group)
  // and checkboxes (each toggles independently).
  document.querySelectorAll('.quiz-answer').forEach(label => {
    const input = label.querySelector('input');
    label.classList.toggle('selected', input.checked);
  });
}

// Locks the answer list, colors it, and returns marks earned (0 or 1). Shared between a
// live submit and redrawing a previously-answered question from stored state.
function applyChoiceGrading(main, q, selectedIdxs) {
  const correctIdxs = new Set(
    q.answers.map((a, i) => a.correct ? i : null).filter(v => v !== null)
  );
  const isCorrect = correctIdxs.size === selectedIdxs.size &&
    [...correctIdxs].every(i => selectedIdxs.has(i));

  main.querySelectorAll('.quiz-answer').forEach((label, i) => {
    label.classList.add('locked');
    const input = label.querySelector('input');
    input.checked = selectedIdxs.has(i);
    input.disabled = true;
    if (correctIdxs.has(i)) label.classList.add('correct');
    else if (selectedIdxs.has(i)) label.classList.add('incorrect');
  });

  return isCorrect ? 1 : 0;
}

function showFeedback(main, earned, total) {
  const feedback = main.querySelector('#quizFeedback');
  if (!feedback) return;
  const markWord = total === 1 ? 'mark' : 'marks';
  feedback.textContent = total === 1
    ? (earned === 1 ? 'Correct! (1/1 mark)' : 'Not quite (0/1 mark) — correct answer(s) highlighted above.')
    : `${earned} / ${total} ${markWord} for this question`;
  feedback.className = 'quiz-feedback ' + (earned === total ? 'quiz-correct' : (earned > 0 ? 'quiz-partial' : 'quiz-incorrect'));
}

function submitAnswer() {
  if (quizState.perQuestion[quizState.index]) return; // already answered — ignore stray resubmits

  const checkedInputs = document.querySelectorAll('input[name="quizAnswer"]:checked');
  if (checkedInputs.length === 0) return;

  const selectedIdxs = new Set([...checkedInputs].map(inp => parseInt(inp.value, 10)));
  const q = quizState.questions[quizState.index];
  const main = document.getElementById('quizMain');

  const earned = applyChoiceGrading(main, q, selectedIdxs);
  quizState.perQuestion[quizState.index] = { earned, total: 1, selected: [...selectedIdxs] };

  showFeedback(main, earned, 1);
  document.getElementById('quizSubmitBtn').style.display = 'none';
  document.getElementById('quizNextBtn').style.display = 'inline-block';
  renderSidebar(); // reflect the new correct/partial/incorrect color on this question's nav button
}

/* ── Math / fill-in-the-blank ── */

// Groups consecutive same-type entries in a math question's `answers` array
// (e.g. two "working" entries in a row → one group; used by both rendering
// and grading, so the two always agree on what counts as one card/group).
function groupMathAnswers(answers) {
  const groups = [];
  answers.forEach((a, i) => {
    const type = a.type === 'working' ? 'working' : 'answer';
    const last = groups[groups.length - 1];
    if (last && last.type === type) {
      last.items.push(i);
    } else {
      groups.push({ type, items: [i] });
    }
  });
  return groups;
}

function renderMathQuestion(q, index, total, prior) {
  const main = document.getElementById('quizMain');
  // Each entry defaults to type "answer" if not set (keeps older question files working
  // unchanged). "working" entries behave identically for grading — same textbox, same
  // numeric-aware matching, same 1 mark — just grouped/labeled as working steps.
  //
  // Consecutive entries of the same type are grouped into one card (e.g. two "working"
  // entries in a row become a single "Working" card with two stacked textboxes), rather
  // than one card per entry. Boxes within a group are interchangeable at grading time —
  // see submitMathAnswer — so a student can fill working steps in any order.
  const groups = groupMathAnswers(q.answers);

  const rows = groups.map((g, gi) => {
    const isWorking = g.type === 'working';
    const label = isWorking ? 'Working' : (g.items.length > 1 ? 'Answers' : 'Answer');
    const placeholder = isWorking ? 'Show your working' : 'Your answer';
    // data-item is the index into q.answers this row corresponds to — lets us read/restore
    // a flat, ordered "given values" array regardless of how rows are grouped into cards.
    const inputRows = g.items.map(itemIdx =>
      `<div class="quiz-math-input-row" data-group="${gi}" data-item="${itemIdx}">
         <input type="text" class="quiz-math-input" placeholder="${placeholder}" autocomplete="off">
         <span class="quiz-math-mark-label">1 mark</span>
       </div>`
    ).join('');
    return `<div class="quiz-math-group${isWorking ? ' quiz-math-working' : ''}" data-group="${gi}">
       <div class="quiz-math-group-label">${label}</div>
       <div class="quiz-math-input-rows">${inputRows}</div>
     </div>`;
  }).join('');

  const markWord = q.answers.length === 1 ? 'mark' : 'marks';

  main.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-progress">Question ${index + 1} of ${total} of "${escapeHtml(quizState.quizName || '')}"</div>
      <div class="quiz-heading">
        <span class="quiz-heading-name"></span>
        <span class="quiz-heading-marks">(${q.answers.length} ${markWord})</span>
      </div>
      <div class="quiz-stem"></div>
      <div class="quiz-image-wrap" id="quizImageWrap"></div>
      <div class="quiz-math-answers">${rows}</div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-actions">
        <button class="quiz-btn quiz-btn-primary" id="quizSubmitBtn" onclick="submitMathAnswer()">Submit</button>
        <button class="quiz-btn" id="quizNextBtn" style="display:none" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
  `;

  renderHeadingAndStem(main, q);
  renderQuestionImage(q, main);

  if (prior) {
    applyMathGrading(main, q, prior.values);
    showFeedback(main, prior.earned, q.answers.length);
    document.getElementById('quizSubmitBtn').style.display = 'none';
    if (index + 1 < total) document.getElementById('quizNextBtn').style.display = 'inline-block';
  }
}

/* ── Shared: heading + stem ──
   q.name is the short exam-style heading ("Question 11"); q.question is the full
   wording. Older quiz files (no `question` field) fall back to showing `name` as
   the stem with no separate heading, so they still render sensibly. Set via
   textContent (not innerHTML) so quiz content can never inject markup. */
function renderHeadingAndStem(container, q) {
  const headingEl = container.querySelector('.quiz-heading');
  const nameEl = container.querySelector('.quiz-heading-name');
  const stemEl = container.querySelector('.quiz-stem');

  if (q.question) {
    if (nameEl) nameEl.textContent = q.name;
    if (stemEl) stemEl.textContent = q.question;
  } else {
    if (headingEl) headingEl.style.display = 'none';
    if (stemEl) stemEl.textContent = q.name;
  }
}

/* ── Shared: optional question image ──
   q.image is a filename/path relative to STORAGE_FOLDER (e.g. "diagram.png" or
   "images/q3.png"). Set via property assignment (not string-interpolated into HTML)
   so a filename can never inject markup. Falls back to a visible error if it 404s. */
function renderQuestionImage(q, container) {
  const wrap = container.querySelector('#quizImageWrap');
  if (!wrap || !q.image) return;

  const img = document.createElement('img');
  img.className = 'quiz-image';
  img.alt = q.question || q.name || 'Question image';
  img.src = `${STORAGE_FOLDER}/${q.image}`;
  img.onerror = () => {
    const err = document.createElement('div');
    err.className = 'quiz-status quiz-error';
    err.textContent = `Could not load image: ${q.image}`;
    img.replaceWith(err);
  };
  wrap.appendChild(img);
}

function valuesMatch(given, expected) {
  const g = String(given).trim();
  const e = String(expected).trim();
  if (g === '') return false;
  const gn = Number(g), en = Number(e);
  if (g !== '' && e !== '' && !isNaN(gn) && !isNaN(en)) return gn === en;
  return g.toLowerCase() === e.toLowerCase();
}

// Finds the best pairing between the boxes a student filled in and the group's
// expected values — each box can match any not-yet-used expected value, not just
// the one at the same position. Returns, per given[i], the index into expected[]
// it was matched to (or -1 if unmatched). Standard augmenting-path bipartite
// matching; group sizes here are tiny (a handful of boxes) so this is instant.
function bestMatch(given, expected) {
  const expectedOwner = new Array(expected.length).fill(-1); // expected idx -> given idx currently matched
  function tryAugment(gi, visited) {
    for (let ei = 0; ei < expected.length; ei++) {
      if (visited[ei] || !valuesMatch(given[gi], expected[ei])) continue;
      visited[ei] = true;
      if (expectedOwner[ei] === -1 || tryAugment(expectedOwner[ei], visited)) {
        expectedOwner[ei] = gi;
        return true;
      }
    }
    return false;
  }
  for (let gi = 0; gi < given.length; gi++) {
    tryAugment(gi, new Array(expected.length).fill(false));
  }
  const givenMatch = new Array(given.length).fill(-1);
  expectedOwner.forEach((gi, ei) => { if (gi !== -1) givenMatch[gi] = ei; });
  return givenMatch;
}

// Fills/locks/colors the input rows from a flat "given values" array (one entry per
// q.answers index) and returns marks earned. Shared between a live submit (values read
// from the inputs) and redrawing a previously-answered question (values read from
// stored per-question state) — both go through the exact same grading logic.
function applyMathGrading(main, q, valuesFlat) {
  const groups = groupMathAnswers(q.answers);
  let earned = 0;

  groups.forEach((g, gi) => {
    const rows = [...main.querySelectorAll(`.quiz-math-input-row[data-group="${gi}"]`)];
    const inputs = rows.map(row => row.querySelector('.quiz-math-input'));
    const given = g.items.map(idx => valuesFlat[idx] ?? '');
    const expected = g.items.map(idx => q.answers[idx].text);

    // Any box may match any not-yet-used expected value in this group, so filling
    // working steps in a different order than the JSON lists them still counts.
    const matchIdx = bestMatch(given, expected);

    rows.forEach((row, i) => {
      inputs[i].value = given[i];
      inputs[i].disabled = true;
      const isRight = matchIdx[i] !== -1;
      row.classList.add(isRight ? 'correct' : 'incorrect');
      if (isRight) earned++;
    });

    const usedExpected = new Set(matchIdx.filter(v => v !== -1));
    const missed = expected.filter((_, ei) => !usedExpected.has(ei));
    if (missed.length > 0) {
      const hint = document.createElement('div');
      hint.className = 'quiz-math-hint';
      hint.textContent = missed.length === 1
        ? `Missing: ${missed[0]}`
        : `Missing: ${missed.join(', ')}`;
      const groupEl = main.querySelector(`.quiz-math-group[data-group="${gi}"]`);
      if (groupEl) groupEl.appendChild(hint);
    }
  });

  return earned;
}

function submitMathAnswer() {
  if (quizState.perQuestion[quizState.index]) return; // already answered — ignore stray resubmits

  const q = quizState.questions[quizState.index];
  const main = document.getElementById('quizMain');

  const valuesFlat = new Array(q.answers.length).fill('');
  main.querySelectorAll('.quiz-math-input-row').forEach(row => {
    const itemIdx = parseInt(row.getAttribute('data-item'), 10);
    valuesFlat[itemIdx] = row.querySelector('.quiz-math-input').value;
  });

  const earned = applyMathGrading(main, q, valuesFlat);
  quizState.perQuestion[quizState.index] = { earned, total: q.answers.length, values: valuesFlat };

  showFeedback(main, earned, q.answers.length);
  document.getElementById('quizSubmitBtn').style.display = 'none';
  document.getElementById('quizNextBtn').style.display = 'inline-block';
  renderSidebar(); // reflect the new correct/partial/incorrect color on this question's nav button
}

/* ── Shared ── */

function nextQuestion() {
  quizState.index++;
  renderQuestion();
}

function renderSummary() {
  const main = document.getElementById('quizMain');
  const earnedMarks = getEarnedMarks();
  const { totalMarks } = quizState;
  main.innerHTML = `
    <div class="quiz-wrap quiz-summary">
      <div class="quiz-progress">Quiz complete</div>
      <div class="quiz-score">${earnedMarks} / ${totalMarks} marks</div>
      <button class="quiz-btn quiz-btn-primary" onclick="loadRandomQuiz()">Try another quiz</button>
    </div>
  `;
}

document.addEventListener('DOMContentLoaded', loadRandomQuiz);
</script>
