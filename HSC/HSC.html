<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBase — Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg-surface: #181c24;
    --bg-raised: #1e2330;
    --bg-hover: #232838;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text-muted: #8b90a0;
    --text-dim: #555b6e;
    --accent: #4f8ef7;
    --accent-bg: rgba(79,142,247,0.12);
    --green: #34d399;
    --green-bg: rgba(52,211,153,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --amber: #fbbf24;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── TOP BAR ─────────────────────────────── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text); text-decoration: none; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .version-badge { font-size: 10px; background: var(--bg-raised); border: 0.5px solid var(--border); border-radius: 4px; padding: 2px 7px; color: var(--text-muted); font-family: var(--font-mono); }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .topbar-date { font-size: 12px; color: var(--text-muted); }
  .icon-btn { width: 32px; height: 32px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; }
  .icon-btn:hover { background: var(--bg-raised); color: var(--text); border-color: var(--border-strong); }

  /* ── BREADCRUMB ──────────────────────────── */
  .breadcrumb {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-surface);
  }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; cursor: pointer; }
  .breadcrumb a:hover { color: var(--text); }
  .breadcrumb .sep { opacity: 0.3; }
  .breadcrumb .current { color: var(--text); }

  /* ── MAIN LAYOUT ─────────────────────────── */
  .main { max-width: 900px; margin: 0 auto; padding: 28px 24px 80px; }

  /* ── SECTION HEADING ─────────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { font-size: 12px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-dim); }
  .add-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 5px 12px;
    border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .add-btn:hover { background: var(--bg-raised); color: var(--text); }

  /* ── SUBJECT GRID ────────────────────────── */
  .subject-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .subject-cell {
    padding: 16px 14px;
    cursor: pointer;
    border-right: 0.5px solid var(--border);
    border-bottom: 0.5px solid var(--border);
    transition: background 0.15s;
    position: relative;
  }
  .subject-cell:nth-child(4n),
  .subject-cell.last-row-end { border-right: none; }
  .subject-cell.no-bottom { border-bottom: none; }
  .subject-cell:hover { background: var(--bg-hover); }
  .subject-cell.active { background: var(--bg-raised); }
  .subject-cell.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .cell-icon { font-size: 20px; margin-bottom: 8px; line-height: 1; }
  .cell-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .cell-meta { font-size: 11px; color: var(--text-dim); }
  .cell-count {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; font-weight: 600; font-family: var(--font-mono);
    background: var(--bg-hover); border-radius: 4px; padding: 2px 6px;
    color: var(--text-muted);
  }
  .cell-count.has-topics { background: var(--accent-bg); color: var(--accent); }

  /* ── EXPANDED SUBJECT PANEL ──────────────── */
  .subject-panel {
    display: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 28px;
  }
  .subject-panel.visible { display: block; }
  .panel-header {
    padding: 14px 18px;
    background: var(--bg-surface);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title-group { display: flex; align-items: center; gap: 10px; }
  .panel-icon { font-size: 18px; }
  .panel-title { font-size: 15px; font-weight: 600; }
  .panel-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .panel-actions { display: flex; gap: 8px; }
  .panel-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 5px 12px;
    border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .panel-btn:hover { background: var(--bg-raised); color: var(--text); }

  /* ── TOPIC ROWS ──────────────────────────── */
  .topic-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 18px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
  }
  .topic-row:last-child { border-bottom: none; }
  .topic-row:hover { background: var(--bg-hover); }
  .topic-row.active { background: var(--bg-raised); }
  .topic-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.15s; }
  .topic-row.active .topic-dot { background: var(--accent); }
  .topic-name { flex: 1; font-size: 13px; color: var(--text); }
  .topic-qcount { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
  .topic-start-btn {
    font-size: 11px; padding: 4px 10px;
    border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; gap: 4px; transition: all 0.15s;
  }
  .topic-start-btn:hover, .topic-row.active .topic-start-btn { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

  /* ── QUIZ AREA ───────────────────────────── */
  .quiz-area { display: none; }
  .quiz-area.visible { display: block; }

  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .quiz-title-group {}
  .quiz-subject-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; }
  .quiz-topic-name { font-size: 20px; font-weight: 600; }
  .quiz-controls { display: flex; gap: 8px; }
  .quiz-ctrl-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 6px 13px;
    border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .quiz-ctrl-btn:hover { background: var(--bg-raised); color: var(--text); }
  .quiz-ctrl-btn.danger:hover { color: var(--red); border-color: var(--red); background: var(--red-bg); }

  /* ── QUESTION CARDS ──────────────────────── */
  .questions-list { display: flex; flex-direction: column; gap: 12px; }

  .q-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .q-card.answered-correct { border-color: rgba(52,211,153,0.3); }
  .q-card.answered-wrong { border-color: rgba(248,113,113,0.3); }

  .q-card-header {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 18px 14px;
    background: var(--bg-surface);
  }
  .q-num {
    font-size: 11px; font-family: var(--font-mono); font-weight: 600;
    color: var(--text-dim); padding-top: 2px; flex-shrink: 0; width: 24px;
  }
  .q-text { font-size: 14px; color: var(--text); line-height: 1.65; flex: 1; }
  .q-card-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .q-edit-btn {
    width: 28px; height: 28px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.15s; opacity: 0;
  }
  .q-card:hover .q-edit-btn { opacity: 1; }
  .q-edit-btn:hover { background: var(--bg-raised); color: var(--text); border-color: var(--border-strong); }

  /* ── ANSWER SECTION ──────────────────────── */
  .q-answer {
    border-top: 0.5px solid var(--border);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }
  .q-answer.revealed { max-height: 400px; }
  .q-answer-inner {
    padding: 14px 18px 14px 56px;
    background: var(--bg-raised);
    display: flex; flex-direction: column; gap: 12px;
  }
  .answer-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 2px; }
  .answer-text { font-size: 14px; color: var(--text); line-height: 1.65; }
  .answer-mark { display: flex; gap: 8px; }
  .mark-btn {
    display: flex; align-items: center; gap: 5px;
    font-size: 12px; padding: 5px 13px;
    border-radius: var(--radius-sm); border: 0.5px solid var(--border-strong);
    background: transparent; cursor: pointer; transition: all 0.15s; color: var(--text-muted);
  }
  .mark-btn.correct-btn:hover, .mark-btn.correct-btn.selected { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .mark-btn.wrong-btn:hover, .mark-btn.wrong-btn.selected { background: var(--red-bg); color: var(--red); border-color: var(--red); }

  /* ── REVEAL BUTTON ───────────────────────── */
  .reveal-row {
    padding: 10px 18px 10px 56px;
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-surface);
    border-top: 0.5px solid var(--border);
  }
  .reveal-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; padding: 5px 13px;
    border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
  }
  .reveal-btn:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

  /* ── EDIT MODAL ──────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-lg);
    width: 520px; max-width: 95vw;
    padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { width: 28px; height: 28px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .modal-close:hover { background: var(--bg-raised); color: var(--text); }
  .field-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-dim); margin-bottom: 6px; }
  .field-input, .field-textarea {
    width: 100%; background: var(--bg-raised);
    border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm);
    color: var(--text); font-family: var(--font); font-size: 13px;
    padding: 9px 12px; outline: none; transition: border-color 0.15s;
    resize: vertical;
  }
  .field-input:focus, .field-textarea:focus { border-color: var(--accent); }
  .field-textarea { min-height: 80px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-cancel { font-size: 13px; padding: 7px 16px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); cursor: pointer; }
  .modal-save { font-size: 13px; padding: 7px 16px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; cursor: pointer; font-weight: 500; }
  .modal-save:hover { opacity: 0.88; }

  /* ── ADD QUESTION BUTTON ─────────────────── */
  .add-question-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px;
    border: 0.5px dashed var(--border-strong); border-radius: var(--radius-lg);
    background: transparent; color: var(--text-muted); cursor: pointer;
    font-size: 13px; transition: all 0.15s; margin-top: 4px;
  }
  .add-question-btn:hover { background: var(--bg-surface); color: var(--text); border-color: var(--accent); }

  /* ── PROGRESS BAR ────────────────────────── */
  .progress-bar-wrap { margin-bottom: 20px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
  .progress-track { height: 3px; background: var(--bg-raised); border-radius: 2px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* ── EMPTY STATE ─────────────────────────── */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }
  .empty-state p { margin-top: 8px; font-size: 13px; }

  @media (max-width: 600px) {
    .subject-grid { grid-template-columns: repeat(2, 1fr); }
    .topbar { padding: 0 14px; }
    .main { padding: 18px 14px 60px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-left">
    <a class="logo" href="#">
      <div class="logo-icon">📚</div>
      StudyBase
    </a>
    <span class="version-badge">v3.0.0</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-date" id="todayDate"></span>
    <button class="icon-btn" title="Settings">⚙</button>
  </div>
</header>

<!-- BREADCRUMB -->
<nav class="breadcrumb" id="breadcrumb">
  <a onclick="goHome()">Home</a>
  <span class="sep">/</span>
  <span class="current" id="breadcrumbCurrent">Subjects</span>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- SUBJECT GRID -->
  <div id="homeView">
    <div class="section-header">
      <span class="section-title">Subjects</span>
      <button class="add-btn" onclick="openAddSubject()">＋ Add subject</button>
    </div>

    <div class="subject-grid" id="subjectGrid"></div>

    <!-- SUBJECT PANEL (topics) -->
    <div class="subject-panel" id="subjectPanel">
      <div class="panel-header">
        <div class="panel-title-group">
          <span class="panel-icon" id="panelIcon"></span>
          <div>
            <div class="panel-title" id="panelTitle"></div>
            <div class="panel-subtitle" id="panelSubtitle"></div>
          </div>
        </div>
        <div class="panel-actions">
          <button class="panel-btn" onclick="openEditSubject()">✏ Edit subject</button>
          <button class="panel-btn" onclick="openAddTopic()">＋ Add topic</button>
        </div>
      </div>
      <div id="topicList"></div>
    </div>
  </div>

  <!-- QUIZ VIEW -->
  <div class="quiz-area" id="quizView">
    <div class="quiz-header">
      <div class="quiz-title-group">
        <div class="quiz-subject-label" id="quizSubjectLabel"></div>
        <div class="quiz-topic-name" id="quizTopicName"></div>
      </div>
      <div class="quiz-controls">
        <button class="quiz-ctrl-btn" onclick="shuffleQuestions()">⇄ Shuffle</button>
        <button class="quiz-ctrl-btn" onclick="revealAll()">👁 Reveal all</button>
        <button class="quiz-ctrl-btn" onclick="openAddQuestion()">＋ Question</button>
        <button class="quiz-ctrl-btn danger" onclick="goHome()">← Back</button>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-meta">
        <span id="progressLabel">0 answered</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="questions-list" id="questionsList"></div>

    <button class="add-question-btn" onclick="openAddQuestion()">＋ Add question to this topic</button>
  </div>

</div>

<!-- EDIT / ADD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Edit question</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" id="modalSaveBtn">Save</button>
    </div>
  </div>
</div>

<script src="HSC_Subjects.js"></script>
<script>
// ── DATA loaded from HSC_Subjects.js ─────────────────────────

// ── STATE ─────────────────────────────────────────────────────
let state = {
  activeSubjectId: null,
  activeTopicId: null,
  modalMode: null,
  editingQIdx: null,
};

// ── INIT ──────────────────────────────────────────────────────
function init() {
  const d = new Date();
  document.getElementById('todayDate').textContent =
    d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'long' });
  renderSubjectGrid();
}

// ── SUBJECT GRID ──────────────────────────────────────────────
function renderSubjectGrid() {
  const grid = document.getElementById('subjectGrid');
  const cols = 4;
  const total = HSC_Subjects.length;
  grid.innerHTML = HSC_Subjects.map((s, i) => {
    const isActive = s.id === state.activeSubjectId;
    const isLastRow = i >= total - (total % cols || cols);
    const isEndCol = (i + 1) % cols === 0 || i === total - 1;
    const topicCount = s.topics.length;
    return `
      <div class="subject-cell ${isActive ? 'active' : ''} ${isLastRow ? 'no-bottom' : ''}"
           onclick="selectSubject('${s.id}')" style="border-right-color: ${isEndCol ? 'transparent' : ''}">
        <div class="cell-count ${topicCount > 0 ? 'has-topics' : ''}">${topicCount}</div>
        <div class="cell-icon">${s.icon}</div>
        <div class="cell-name">${s.name}</div>
        <div class="cell-meta">${topicCount > 0 ? topicCount + ' topic' + (topicCount !== 1 ? 's' : '') : 'No topics yet'}</div>
      </div>
    `;
  }).join('');
}

function selectSubject(id) {
  if (state.activeSubjectId === id) {
    state.activeSubjectId = null;
    renderSubjectGrid();
    document.getElementById('subjectPanel').classList.remove('visible');
    return;
  }
  state.activeSubjectId = id;
  renderSubjectGrid();
  renderSubjectPanel();
}

function renderSubjectPanel() {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  if (!s) return;
  document.getElementById('panelIcon').textContent = s.icon;
  document.getElementById('panelTitle').textContent = s.name;
  document.getElementById('panelSubtitle').textContent =
    s.topics.length + ' topic' + (s.topics.length !== 1 ? 's' : '');

  const list = document.getElementById('topicList');
  if (s.topics.length === 0) {
    list.innerHTML = `<div class="empty-state">📭<p>No topics yet — add one to get started.</p></div>`;
  } else {
    list.innerHTML = s.topics.map(t => `
      <div class="topic-row ${t.id === state.activeTopicId ? 'active' : ''}" onclick="openQuiz('${s.id}','${t.id}')">
        <div class="topic-dot"></div>
        <span class="topic-name">${t.name}</span>
        <span class="topic-qcount">${t.questions.length}q</span>
        <button class="topic-start-btn">▶ Start</button>
      </div>
    `).join('');
  }
  document.getElementById('subjectPanel').classList.add('visible');
}

// ── QUIZ VIEW ─────────────────────────────────────────────────
function openQuiz(subjectId, topicId) {
  const s = HSC_Subjects.find(x => x.id === subjectId);
  const t = s.topics.find(x => x.id === topicId);
  state.activeSubjectId = subjectId;
  state.activeTopicId = topicId;

  document.getElementById('quizSubjectLabel').textContent = s.name;
  document.getElementById('quizTopicName').textContent = t.name;
  document.getElementById('breadcrumbCurrent').textContent = s.name + ' › ' + t.name;

  renderQuestions();
  updateProgress();

  document.getElementById('homeView').style.display = 'none';
  document.getElementById('quizView').classList.add('visible');
}

function goHome() {
  state.activeTopicId = null;
  document.getElementById('homeView').style.display = '';
  document.getElementById('quizView').classList.remove('visible');
  document.getElementById('breadcrumbCurrent').textContent = 'Subjects';
  renderSubjectGrid();
  if (state.activeSubjectId) renderSubjectPanel();
}

function renderQuestions() {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  const t = s.topics.find(x => x.id === state.activeTopicId);
  const list = document.getElementById('questionsList');

  if (t.questions.length === 0) {
    list.innerHTML = `<div class="empty-state">📝<p>No questions yet — add the first one below.</p></div>`;
    return;
  }

  list.innerHTML = t.questions.map((q, i) => `
    <div class="q-card" id="qcard-${i}" data-idx="${i}">
      <div class="q-card-header">
        <span class="q-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="q-text">${escHtml(q.q)}</span>
        <div class="q-card-actions">
          <button class="q-edit-btn" onclick="openEditQuestion(${i})" title="Edit question">✏</button>
        </div>
      </div>
      <div class="reveal-row">
        <button class="reveal-btn" id="reveal-btn-${i}" onclick="revealAnswer(${i})">👁 Show answer</button>
      </div>
      <div class="q-answer" id="answer-${i}">
        <div class="q-answer-inner">
          <div>
            <div class="answer-label">Answer</div>
            <div class="answer-text">${escHtml(q.a)}</div>
          </div>
          <div class="answer-mark">
            <button class="mark-btn correct-btn" id="mark-correct-${i}" onclick="markAnswer(${i}, true)">✓ Got it</button>
            <button class="mark-btn wrong-btn" id="mark-wrong-${i}" onclick="markAnswer(${i}, false)">✗ Missed it</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function revealAnswer(idx) {
  const ansEl = document.getElementById(`answer-${idx}`);
  const btnEl = document.getElementById(`reveal-btn-${idx}`);
  ansEl.classList.toggle('revealed');
  btnEl.textContent = ansEl.classList.contains('revealed') ? '🙈 Hide answer' : '👁 Show answer';
}

function revealAll() {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  const t = s.topics.find(x => x.id === state.activeTopicId);
  t.questions.forEach((_, i) => {
    document.getElementById(`answer-${i}`).classList.add('revealed');
    document.getElementById(`reveal-btn-${i}`).textContent = '🙈 Hide answer';
  });
}

function markAnswer(idx, correct) {
  const card = document.getElementById(`qcard-${idx}`);
  card.classList.remove('answered-correct', 'answered-wrong');
  card.classList.add(correct ? 'answered-correct' : 'answered-wrong');
  document.getElementById(`mark-correct-${idx}`).classList.toggle('selected', correct);
  document.getElementById(`mark-wrong-${idx}`).classList.toggle('selected', !correct);
  card.dataset.marked = correct ? 'correct' : 'wrong';
  updateProgress();
}

function updateProgress() {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  const t = s ? s.topics.find(x => x.id === state.activeTopicId) : null;
  if (!t) return;
  const cards = document.querySelectorAll('.q-card[data-marked]');
  const answered = cards.length;
  const total = t.questions.length;
  const pct = total > 0 ? Math.round(answered / total * 100) : 0;
  document.getElementById('progressLabel').textContent = answered + ' of ' + total + ' answered';
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function shuffleQuestions() {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  const t = s.topics.find(x => x.id === state.activeTopicId);
  for (let i = t.questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [t.questions[i], t.questions[j]] = [t.questions[j], t.questions[i]];
  }
  renderQuestions();
  updateProgress();
}

// ── MODAL ─────────────────────────────────────────────────────
function openModal(title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  state.modalMode = null;
  state.editingQIdx = null;
}

function openEditQuestion(idx) {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  const t = s.topics.find(x => x.id === state.activeTopicId);
  const q = t.questions[idx];
  state.modalMode = 'editQuestion';
  state.editingQIdx = idx;
  openModal('Edit question');
  document.getElementById('modalBody').innerHTML = `
    <div><div class="field-label">Question</div><textarea class="field-textarea" id="mQ" rows="3">${escHtml(q.q)}</textarea></div>
    <div><div class="field-label">Answer</div><textarea class="field-textarea" id="mA" rows="3">${escHtml(q.a)}</textarea></div>
    <button class="quiz-ctrl-btn danger" style="width:100%;justify-content:center;margin-top:4px;" onclick="deleteQuestion(${idx})">🗑 Delete question</button>
  `;
  document.getElementById('modalSaveBtn').onclick = saveQuestion;
}

function openAddQuestion() {
  state.modalMode = 'addQuestion';
  state.editingQIdx = null;
  openModal('Add question');
  document.getElementById('modalBody').innerHTML = `
    <div><div class="field-label">Question</div><textarea class="field-textarea" id="mQ" rows="3" placeholder="Enter your question…"></textarea></div>
    <div><div class="field-label">Answer</div><textarea class="field-textarea" id="mA" rows="3" placeholder="Enter the answer…"></textarea></div>
  `;
  document.getElementById('modalSaveBtn').onclick = saveQuestion;
}

function saveQuestion() {
  const qText = document.getElementById('mQ').value.trim();
  const aText = document.getElementById('mA').value.trim();
  if (!qText || !aText) return;
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  const t = s.topics.find(x => x.id === state.activeTopicId);
  if (state.modalMode === 'editQuestion') {
    t.questions[state.editingQIdx] = { q: qText, a: aText };
  } else {
    t.questions.push({ q: qText, a: aText });
  }
  closeModal();
  renderQuestions();
  updateProgress();
}

function deleteQuestion(idx) {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  const t = s.topics.find(x => x.id === state.activeTopicId);
  t.questions.splice(idx, 1);
  closeModal();
  renderQuestions();
  updateProgress();
}

function openAddTopic() {
  state.modalMode = 'addTopic';
  openModal('Add topic');
  document.getElementById('modalBody').innerHTML = `
    <div><div class="field-label">Topic name</div><input class="field-input" id="mTopicName" placeholder="e.g. Quadratic Equations"></div>
  `;
  document.getElementById('modalSaveBtn').onclick = saveTopic;
}

function saveTopic() {
  const name = document.getElementById('mTopicName').value.trim();
  if (!name) return;
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  const id = name.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now();
  s.topics.push({ id, name, questions: [] });
  closeModal();
  renderSubjectPanel();
}

function openEditSubject() {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  state.modalMode = 'editSubject';
  openModal('Edit subject');
  document.getElementById('modalBody').innerHTML = `
    <div><div class="field-label">Subject name</div><input class="field-input" id="mSubName" value="${escHtml(s.name)}"></div>
    <div><div class="field-label">Icon (emoji)</div><input class="field-input" id="mSubIcon" value="${s.icon}" style="font-size:20px;width:80px;"></div>
  `;
  document.getElementById('modalSaveBtn').onclick = saveSubject;
}

function saveSubject() {
  const s = HSC_Subjects.find(x => x.id === state.activeSubjectId);
  s.name = document.getElementById('mSubName').value.trim() || s.name;
  s.icon = document.getElementById('mSubIcon').value.trim() || s.icon;
  closeModal();
  renderSubjectGrid();
  renderSubjectPanel();
}

function openAddSubject() {
  state.modalMode = 'addSubject';
  openModal('Add subject');
  document.getElementById('modalBody').innerHTML = `
    <div><div class="field-label">Subject name</div><input class="field-input" id="mSubName" placeholder="e.g. Biology"></div>
    <div><div class="field-label">Icon (emoji)</div><input class="field-input" id="mSubIcon" value="📚" style="font-size:20px;width:80px;"></div>
  `;
  document.getElementById('modalSaveBtn').onclick = () => {
    const name = document.getElementById('mSubName').value.trim();
    if (!name) return;
    const id = name.toLowerCase().replace(/\s+/g, '-') + '-' + Date.now();
    HSC_Subjects.push({ id, name, icon: document.getElementById('mSubIcon').value.trim() || '📚', color: '#94a3b8', topics: [] });
    closeModal();
    renderSubjectGrid();
  };
}

// ── UTILS ─────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
</body>
</html>
