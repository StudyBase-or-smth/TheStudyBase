<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyBase</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
*::-webkit-scrollbar{display:none}

body{background:#f5f2ed;color:#1c1917;font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
:root{
  --bg:#f5f2ed;--card:#ffffff;--card2:#faf8f5;--border:#e2ddd7;--border2:#d4cec7;
  --text:#1c1917;--muted:#78716c;--muted2:#a8a29e;--shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
}
.wrap{max-width:1060px;margin:0 auto;padding:0 24px}

.hdr-outer{background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:stretch}
.accent-bar{width:4px;flex-shrink:0}
.hdr-main{flex:1;display:flex;flex-direction:column;min-width:0}
.hdr-top{display:flex;align-items:center;padding:0 20px;height:44px;gap:10px}
.logo-block{display:flex;align-items:center;gap:9px;padding-right:14px;border-right:1px solid var(--border);flex-shrink:0}
.logo-icon2{width:24px;height:24px;background:var(--text);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.logo-text2{font-size:13px;font-weight:700;color:var(--text);font-family:'Lora',serif;letter-spacing:-.2px;white-space:nowrap}
.logo-sub-txt{font-size:9px;color:var(--muted2);letter-spacing:.5px;display:block;line-height:1;margin-top:1px}
.hdr-date-pill{font-size:11px;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap}
.hdr-ghost{background:none;border:1px solid var(--border);border-radius:5px;padding:4px 7px;font-size:12px;color:var(--text);cursor:pointer;transition:all .12s}
.hdr-ghost:hover{background:var(--card2);border-color:var(--muted2)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:28px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 20px;box-shadow:var(--shadow)}
.stat-num{font-family:'Lora',serif;font-size:30px;font-weight:700;line-height:1;margin-bottom:4px;color:var(--text)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:500}

/* SUBJECTS */
.sec-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.subj-card{display:block;text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px 20px;position:relative;overflow:hidden;transition:all .15s;box-shadow:var(--shadow)}
.subj-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);cursor:pointer}
.subj-emoji{font-size:22px;margin-bottom:10px}
.subj-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.subj-meta{font-size:11px;color:var(--muted)}
.subj-count{position:absolute;top:16px;right:16px;min-width:22px;height:22px;border-radius:11px;padding:0 6px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}

/* CALENDAR */
.cal-section{margin-top:20px}
.cal-card{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.cal-title{font-family:'Lora',serif;font-size:16px;font-weight:600;color:var(--text)}
.cal-nav{display:flex;gap:6px}
.cal-nav-btn{background:none;border:1px solid var(--border);border-radius:6px;min-width:28px;height:28px;padding:0 8px;cursor:pointer;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:inherit}
.cal-nav-btn:hover{background:var(--card2);border-color:var(--border2);color:var(--text)}
.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-grid-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;padding:10px 4px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted2);font-weight:600;border-bottom:1px solid var(--border)}
.cal-day{min-height:72px;padding:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:default;transition:background .12s}
.cal-day.other-month{opacity:.35}
.cal-day.today .cal-day-num{background:var(--text);color:var(--card);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center}

/* DARK */
body.dark{
  --bg:#141210;--card:#1e1c19;--card2:#252220;--border:#302d29;--border2:#3d3935;
  --text:#e8e3dc;--muted:#9e9890;--muted2:#6b6560;
  background:#141210;color:#e8e3dc;
}
</style>
</head>
<body>

<div class="hdr-outer">
  <div class="accent-bar" style="background:#f59e0b"></div>
  <div class="hdr-main">
    <div class="hdr-top">
      <div class="logo-block">
        <div class="logo-icon2">🎓</div>
        <div>
          <div class="logo-text2">StudyBase</div>
          <span class="logo-sub-txt">SCHOOL REFERENCE</span>
        </div>
      </div>
      <div id="branch-badge" style="font-size:11px;color:#15803d;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;white-space:nowrap;">
        <strong>main</strong> · v2.1.0
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
        <span class="hdr-date-pill">Today — <strong id="todayDate"></strong></span>
        <button class="hdr-ghost" id="darkToggle">🌙</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap" style="margin-top:28px">
  <div class="stats-row" id="statsRow"></div>

  <div id="dashboard">
    <div class="sec-title">Subjects</div>
    <div class="subjects-grid" id="subjectsGrid"></div>

    <div class="cal-section">
      <div class="cal-card">
        <div class="cal-header">
          <div class="cal-title" id="calMonthLabel"></div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
              <button class="cal-nav-btn" onclick="calGoToday()">Today</button>
              <button class="cal-nav-btn" onclick="calNav(1)">›</button>
            </div>
          </div>
        </div>
        <div class="cal-grid-header" id="calDow"></div>
        <div class="cal-grid-body" id="calGrid"></div>
      </div>
    </div>
  </div>
</div>

<script src="subjects.js"></script>
<script>
// ── Dark mode (persist) ──
(function(){
  const on = localStorage.getItem('studybase_dark') === '1';
  if(on) document.body.classList.add('dark');
  const btn = document.getElementById('darkToggle');
  if(btn) btn.textContent = on ? '☀️' : '🌙';
})();

document.getElementById('darkToggle').onclick = function(){
  const on = document.body.classList.toggle('dark');
  localStorage.setItem('studybase_dark', on ? '1' : '0');
  this.textContent = on ? '☀️' : '🌙';
};

// ── Calendar state ──
const TODAY = new Date();
let calYear  = TODAY.getFullYear();
let calMonth = TODAY.getMonth(); // 0-based

// ── Init ──
function init(){
  if(typeof subjectsData === 'undefined'){
    document.getElementById('subjectsGrid').innerHTML =
      '<p style="color:red;padding:20px;grid-column:1/-1">subjects.js not found or failed to load.</p>';
    return;
  }
  renderSubjects();
  renderStats();
  renderCalendar();

  document.getElementById('todayDate').textContent =
    TODAY.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
}

// ── Subject cards ──
function renderSubjects(){
  const subjects = subjectsData.subjects || [];
  const grid = document.getElementById('subjectsGrid');
  grid.innerHTML = subjects.map(s => {
    const topics = getTopics(s);
    const units  = getUnits(s);
    const meta   = topics.length
      ? `${topics.length} topic${topics.length !== 1 ? 's' : ''} · ${units.length} unit${units.length !== 1 ? 's' : ''}`
      : 'No topics yet';
    return `
      <a href="subject.html#${s.id}" class="subj-card" style="border-top:4px solid ${s.colour}">
        <div class="subj-emoji">${s.emoji || '📚'}</div>
        <div class="subj-count" style="background:${s.colour}">${topics.length}</div>
        <div class="subj-name">${s.name}</div>
        <div class="subj-meta">${meta}</div>
      </a>`;
  }).join('');
}

// ── Pull topics/units from localStorage using each subject's own keys ──
function getTopics(s){
  const key = s.storageKey || (s.id + '_topics');
  try{ return JSON.parse(localStorage.getItem(key) || '[]'); }
  catch(e){ return []; }
}

function getUnits(s){
  const key = s.unitsKey || (s.id + '_units');
  try{ return JSON.parse(localStorage.getItem(key) || '[]'); }
  catch(e){ return []; }
}

// ── Stats ──
function renderStats(){
  const subjects = subjectsData.subjects || [];
  let totalTopics = 0, totalUnits = 0, lastDate = null;

  subjects.forEach(s => {
    const topics = getTopics(s);
    const units  = getUnits(s);
    totalTopics += topics.length;
    totalUnits  += units.length;
    topics.forEach(t => {
      const d = t.updatedAt || t.createdAt;
      if(d && (!lastDate || d > lastDate)) lastDate = d;
    });
  });

  const lastStr = lastDate
    ? new Date(lastDate).toLocaleDateString('en-AU',{day:'numeric',month:'short'})
    : '—';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${totalTopics}</div><div class="stat-label">Total Topics</div></div>
    <div class="stat-card"><div class="stat-num">${totalUnits}</div><div class="stat-label">Total Units</div></div>
    <div class="stat-card"><div class="stat-num">${subjects.length}</div><div class="stat-label">Subjects</div></div>
    <div class="stat-card"><div class="stat-num" style="font-size:20px">${lastStr}</div><div class="stat-label">Last Updated</div></div>
  `;
}

// ── Calendar (correct Mon-start, proper month layout) ──
const DOWS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function renderCalendar(){
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent = months[calMonth] + ' ' + calYear;

  // Day-of-week headers
  document.getElementById('calDow').innerHTML =
    DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth + 1, 0);

  // Monday = 0 offset; JS Sunday=0 so remap
  let startOffset = (firstDay.getDay() + 6) % 7; // Mon=0 … Sun=6
  const totalDays = lastDay.getDate();

  // Fill in prev-month padding
  const prevLast = new Date(calYear, calMonth, 0).getDate();
  let cells = [];
  for(let i = startOffset - 1; i >= 0; i--){
    cells.push({ day: prevLast - i, cur: false });
  }
  for(let d = 1; d <= totalDays; d++){
    cells.push({ day: d, cur: true });
  }
  // Fill remaining to complete last row
  let next = 1;
  while(cells.length % 7 !== 0){
    cells.push({ day: next++, cur: false });
  }

  const isToday = (d) =>
    d.cur &&
    d.day === TODAY.getDate() &&
    calMonth === TODAY.getMonth() &&
    calYear  === TODAY.getFullYear();

  document.getElementById('calGrid').innerHTML = cells.map(d => `
    <div class="cal-day${d.cur ? '' : ' other-month'}${isToday(d) ? ' today' : ''}">
      <div class="cal-day-num">${d.day}</div>
    </div>`).join('');
}

function calNav(dir){
  calMonth += dir;
  if(calMonth > 11){ calMonth = 0;  calYear++; }
  if(calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function calGoToday(){
  calYear  = TODAY.getFullYear();
  calMonth = TODAY.getMonth();
  renderCalendar();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
