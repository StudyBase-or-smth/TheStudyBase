[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[dev]
  port = 8888

[[redirects]]
  from = "/api/grade"
  to = "/.netlify/functions/grade"
  status = 200

[[redirects]]
  from = "/api/registerRole"
  to = "/.netlify/functions/registerRole"
  status = 200

[[redirects]]
  from = "/api/getPendingUsers"
  to = "/.netlify/functions/getPendingUsers"
  status = 200

[[redirects]]
  from = "/api/getAllUsers"
  to = "/.netlify/functions/getAllUsers"
  status = 200

[[redirects]]
  from = "/api/approveUser"
  to = "/.netlify/functions/approveUser"
  status = 200

[[redirects]]
  from = "/api/rejectUser"
  to = "/.netlify/functions/rejectUser"
  status = 200

[[redirects]]
  # Note: the function file is netlify/functions/Updateusername.js, so
  # Netlify deploys it as function "Updateusername" (case-sensitive) —
  # the redirect target below must match that exact case, even though the
  # friendly /api path and Devpanel.html use the more conventional casing.
  from = "/api/updateUserName"
  to = "/.netlify/functions/Updateusername"
  status = 200

# Baseline security headers on every response. NOTE: a real Content-Security-Policy
# is intentionally not set here — the app relies heavily on inline onclick="..."
# handlers and inline <script> blocks, so a CSP strict enough to matter would need
# 'unsafe-inline' anyway (which defeats most of its XSS protection) or a real
# refactor to externalize scripts and event handlers first.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"